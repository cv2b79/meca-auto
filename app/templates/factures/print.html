{% extends "factures/facture_base.html" %}

{% block no_print %}
<div class="no-print" style="display:flex; gap:0.75rem; align-items:center; padding:0.5rem 0 1rem;">
    <a href="{{ url_for('factures.view', id=facture.id) }}"
       style="padding:0.5rem 1rem; background:#1E3A5F; color:white; border-radius:4px; text-decoration:none; font-size:9pt;">
       ← Retour
    </a>
    <button onclick="window.print()"
        style="padding:0.5rem 1rem; background:#2E6DA4; color:white; border:none; border-radius:4px; cursor:pointer; font-size:9pt;">
        🖨️ Imprimer
    </button>
    <a href="{{ url_for('factures.pdf', id=facture.id) }}"
       style="padding:0.5rem 1rem; background:#388e3c; color:white; border-radius:4px; text-decoration:none; font-size:9pt;">
       ⬇️ Télécharger PDF
    </a>
</div>
{% endblock %}
