{% extends "base.html" %}
{% block title %}Nouvel OR{% endblock %}
{% block content %}
<h2 style="margin-bottom: 0.5rem;">Nouvel Ordre de réparation</h2>

<form method="POST">
    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 1rem;">
        
        <div class="card" style="padding: 0.75rem; margin: 0;">
            <h4 style="margin: 0 0 0.5rem 0;">🔍 Véhicule</h4>
            <div class="form-group" style="margin-bottom: 0.4rem;">
                <label style="font-size: 0.85rem;">Immatriculation *</label>
                <div style="display: flex; gap: 0.3rem;">
                    <input type="text" id="immat" name="immatriculation" required style="text-transform: uppercase; flex: 1; padding: 0.4rem;">
                    <button type="button" onclick="searchVehicle()" style="padding: 0.4rem;">🔍</button>
                </div>
            </div>
            <input type="hidden" name="vehicule_id" id="vehicule_id">
            <div id="result" style="font-size: 0.8rem; padding: 0.3rem; margin-bottom: 0.5rem;"></div>
            <div id="new_vehicle" style="display: none;">
                <input type="text" name="marque" placeholder="Marque" style="width: 100%; padding: 0.3rem; margin-bottom: 0.3rem;">
                <input type="text" name="modele" placeholder="Modèle" style="width: 100%; padding: 0.3rem; margin-bottom: 0.3rem;">
                <input type="number" name="annee" placeholder="Année" style="width: 100%; padding: 0.3rem;">
            </div>
            
            <hr style="margin: 0.5rem 0;">
            <h4 style="margin: 0.5rem 0 0.3rem 0;">👤 Client</h4>
            <input type="text" name="client_nom" id="client_nom" placeholder="Nom" required style="width: 100%; padding: 0.4rem; margin-bottom: 0.3rem;">
            <input type="text" name="client_prenom" id="client_prenom" placeholder="Prénom" required style="width: 100%; padding: 0.4rem; margin-bottom: 0.3rem;">
            <input type="tel" name="client_tel" id="client_tel" placeholder="Téléphone" style="width: 100%; padding: 0.4rem; margin-bottom: 0.3rem;">
            <input type="email" name="client_email" id="client_email" placeholder="Email" style="width: 100%; padding: 0.4rem;">
        </div>

        <div class="card" style="padding: 0.75rem; margin: 0;">
            <h4 style="margin: 0 0 0.5rem 0;">📋 Description</h4>
            <textarea name="description" id="description" rows="4" placeholder="Travaux demandés..." style="width: 100%; padding: 0.4rem;"></textarea>
            <p style="font-size: 0.8rem; color: #666; margin-top: 0.5rem;">La tarification sera définie à la clôture de l'OR</p>
        </div>

        <div class="card" style="padding: 0.75rem; margin: 0;">
            <h4 style="margin: 0 0 0.5rem 0;">👨‍🎓 Classe & Options</h4>
            <select name="classe_nom" style="width: 100%; padding: 0.4rem; margin-bottom: 0.5rem;">
                <option value="">-- Classe --</option>
                {% for c in classes %}
                <option value="{{ c.nom }}">{{ c.nom }}</option>
                {% endfor %}
            </select>
            <input type="text" name="eleve_nom" placeholder="Élève" style="width: 100%; padding: 0.4rem; margin-bottom: 0.5rem;">
            <label style="display: flex; align-items: center; gap: 0.3rem; font-size: 0.85rem; color: #856404;">
                
            </label>
            
            <hr style="margin: 0.5rem 0;">
            <label style="display: flex; align-items: center; gap: 0.3rem; font-size: 0.85rem;">
                <input type="checkbox" id="plan_rdv_check" onchange="if(this.checked){document.getElementById('rdv_fields').style.display='block';}else{document.getElementById('rdv_fields').style.display='none';}"> 📅 avec prise de rendez-vous
            </label>
            <div id="rdv_fields" style="display: none; margin-top: 0.5rem;">
                <input type="date" name="rdv_date" style="width: 100%; padding: 0.4rem; margin-bottom: 0.3rem;">
                <input type="time" name="rdv_time" value="09:00" style="width: 100%; padding: 0.4rem;">
            </div>
        </div>
    </div>

    <div style="display: flex; gap: 1rem; justify-content: center;">
        <button type="submit" class="btn">✅ Créer l'OR</button>
        <a href="{{ url_for('ordres.list') }}" class="btn btn-secondary">Annuler</a>
    </div>
</form>

<script>
var surchargesData = {{ surcharges_list|tojson }};

function updateSurcharge() {
    var rp = document.getElementById('recup_pieces').checked;
    var rf = document.getElementById('recup_fluides').checked;
    var si = document.getElementById('surcharge_info');
    var mi = document.getElementById('montant_surcharge');
    var total = 0, texts = [];
    if (!rp) { var s = surchargesData.find(function(x) { return x.nom.includes('Pièces'); }); if (s) { total += parseFloat(s.montant); texts.push(s.nom + ': ' + s.montant + '€'); } }
    if (!rf) { var s = surchargesData.find(function(x) { return x.nom.includes('Huiles'); }); if (s) { total += parseFloat(s.montant); texts.push(s.nom + ': ' + s.montant + '€'); } }
    mi.value = total;
    si.innerHTML = total > 0 ? '<strong>Dépollution: ' + total + '€</strong><br>' + texts.join('<br>') : '';
}

function searchVehicle() {
    var immat = document.getElementById('immat').value.toUpperCase().replace(/[^A-Z0-9]/g, '');
    var resultDiv = document.getElementById('result');
    var vehiculeIdInput = document.getElementById('vehicule_id');
    var newVehicleDiv = document.getElementById('new_vehicle');
    if (immat.length < 2) { resultDiv.innerHTML = '<span style="color:red;">Trop court</span>'; return; }
    resultDiv.innerHTML = '<span>Recherche...</span>';
    var xhr = new XMLHttpRequest();
    xhr.open('GET', '/vehicules/search?q=' + immat, true);
    xhr.onload = function() {
        if (xhr.status === 200) {
            try {
                var data = JSON.parse(xhr.responseText);
                if (data.found && data.vehicule) {
                    var v = data.vehicule;
                    vehiculeIdInput.value = v.id;
                    resultDiv.innerHTML = '<span style="color:green;">✓ ' + v.immatriculation + '</span>';
                    newVehicleDiv.style.display = 'none';
                    if (v.proprietaire) {
                        document.getElementById('client_nom').value = v.proprietaire.nom || '';
                        document.getElementById('client_prenom').value = v.proprietaire.prenom || '';
                        document.getElementById('client_tel').value = v.proprietaire.telephone || '';
                        document.getElementById('client_email').value = v.proprietaire.email || '';
                    }
                } else {
                    vehiculeIdInput.value = '';
                    resultDiv.innerHTML = '<span style="color:orange;">Nouveau véhicule</span>';
                    newVehicleDiv.style.display = 'block';
                    document.getElementById('client_nom').value = '';
                    document.getElementById('client_prenom').value = '';
                    document.getElementById('client_tel').value = '';
                    document.getElementById('client_email').value = '';
                }
            } catch(e) { resultDiv.innerHTML = '<span style="color:red;">Erreur</span>'; }
        }
    };
    xhr.send();
}
</script>
{% endblock %}
