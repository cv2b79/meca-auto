{% extends "base.html" %}
{% block title %}Modifier checklist - MEC AUTO{% endblock %}
{% block content %}
<h2>Modifier point de contrôle</h2>

<div class="card" style="max-width: 500px;">
    <form method="POST">
        <div class="form-group">
            <label>Nom du point de contrôle</label>
            <input type="text" name="nom" value="{{ item.nom }}" required>
        </div>
        <div class="form-group">
            <label>Description (optionnel)</label>
            <input type="text" name="description" value="{{ item.description or '' }}">
        </div>
        <div style="display: flex; gap: 1rem;">
            <button type="submit" class="btn">Enregistrer</button>
            <a href="{{ url_for('settings.checklist') }}" class="btn btn-secondary">Annuler</a>
        </div>
    </form>
</div>
{% endblock %}
