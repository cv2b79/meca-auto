{% extends "base.html" %}
{% block title %}Log de sauvegarde — Meca Auto{% endblock %}

{% block content %}
<div class="container-fluid py-4">
  <div class="d-flex align-items-center justify-content-between mb-3">
    <h4 class="mb-0">🗄️ Log de sauvegarde</h4>
    <a href="{{ url_for('settings.admin') }}#sauvegardes" class="btn btn-outline-secondary btn-sm">
      ← Retour
    </a>
  </div>

  <div class="card shadow-sm">
    <div class="card-header d-flex justify-content-between align-items-center">
      <span class="fw-semibold">backup.log</span>
      <small class="text-muted">500 dernières lignes</small>
    </div>
    <div class="card-body p-0">
      <pre class="m-0 p-3" style="
        background:#1e1e1e;
        color:#d4d4d4;
        font-size:0.78rem;
        max-height:75vh;
        overflow-y:auto;
        white-space:pre-wrap;
        word-break:break-all;
      ">{{ log_content }}</pre>
    </div>
  </div>
</div>
{% endblock %}
