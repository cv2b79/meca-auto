{% extends "base.html" %}
{% block title %}{% if client %}Modifier{% else %}Nouveau{% endif %} Client{% endblock %}
{% block content %}
<h2>{% if client %}Modifier{% else %}Nouveau{% endif %} Client</h2>
<form method="POST" class="card">
    <div class="form-group"><label>Nom</label><input type="text" name="nom" value="{{ client.nom if client else '' }}" required></div>
    <div class="form-group"><label>Prénom</label><input type="text" name="prenom" value="{{ client.prenom if client else '' }}" required></div>
    <div class="form-group"><label>Adresse</label><input type="text" name="adresse" value="{{ client.adresse if client else '' }}"></div>
    <div class="form-group"><label>Téléphone</label><input type="text" name="telephone" value="{{ client.telephone if client else '' }}"></div>
    <div class="form-group"><label>Email</label><input type="email" name="email" value="{{ client.email if client else '' }}"></div>
    <button type="submit" class="btn">Enregistrer</button>
    <a href="{{ url_for('clients.list') }}" class="btn btn-secondary">Annuler</a>
</form>
{% endblock %}
