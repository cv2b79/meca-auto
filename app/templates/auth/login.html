{% extends "base.html" %}

{% block title %}Connexion - MEC AUTO{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 4rem auto;">
    <div class="card">
        <h2 style="text-align: center; margin-bottom: 2rem;">Connexion</h2>
        <form method="POST">
            <div class="form-group">
                <label for="login">Login ou Email</label>
                <input type="text" id="login" name="login" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="btn" style="width: 100%;">Se connecter</button>
        </form>
        <p style="text-align: center; margin-top: 1rem;">
            <a href="{{ url_for('auth.forgot_password') }}" style="color: #666;">Mot de passe oublié ?</a>
        </p>
        <p style="text-align: center; margin-top: 0.5rem;">
            <a href="{{ url_for('auth.setup') }}" style="color: #666; font-size: 0.9rem;">Créer le premier compte</a>
        </p>
    </div>
</div>
{% endblock %}
