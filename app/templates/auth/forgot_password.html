{% extends "base.html" %}
{% block title %}Mot de passe oublié - MEC AUTO{% endblock %}
{% block content %}
<h2>Mot de passe oublié</h2>

<div class="card" style="max-width: 500px; margin: 0 auto;">
    {% if not user_id %}
    <form method="POST">
        <input type="hidden" name="action" value="check_question">
        <div class="form-group">
            <label>Login</label>
            <input type="text" name="login" required>
        </div>
        <div class="form-group">
            <label>Email (optionnel)</label>
            <input type="email" name="email">
        </div>
        <button type="submit" class="btn">Continuer</button>
        <a href="{{ url_for('auth.login') }}" class="btn btn-secondary">Retour</a>
    </form>
    {% elif step == 'answer' %}
    <form method="POST">
        <input type="hidden" name="action" value="reset_password">
        <input type="hidden" name="user_id" value="{{ user_id }}">
        <p><strong>Question de sécurité:</strong></p>
        <p style="color: #666; margin-bottom: 1rem;">{{ user.security_question }}</p>
        
        <div class="form-group">
            <label>Votre réponse</label>
            <input type="text" name="answer" required autocomplete="off">
        </div>
        
        <hr style="margin: 1.5rem 0;">
        
        <div class="form-group">
            <label>Nouveau mot de passe</label>
            <input type="password" name="new_password" required minlength="4">
        </div>
        <div class="form-group">
            <label>Confirmer le mot de passe</label>
            <input type="password" name="confirm_password" required minlength="4">
        </div>
        
        <button type="submit" class="btn">Réinitialiser</button>
        <a href="{{ url_for('auth.forgot_password') }}" class="btn btn-secondary">Recommencer</a>
    </form>
    {% endif %}
</div>
{% endblock %}
